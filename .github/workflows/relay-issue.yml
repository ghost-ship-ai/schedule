name: Relay Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  relay:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@ghost-ship-ai'))
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to Ghost Ship
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/dispatch_response -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ secrets.GHOST_SHIP_REPO }}/dispatches" \
            -d '{
              "event_type": "fix-issue",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "issue_number": ${{ github.event.issue.number }},
                "trigger": "${{ github.event_name }}"
              }
            }')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch failed with HTTP ${HTTP_CODE}:"
            cat /tmp/dispatch_response
            exit 1
          fi
          echo "Dispatched fix-issue (HTTP ${HTTP_CODE})"
