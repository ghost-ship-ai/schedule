name: Relay Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  plan:
    # fix-me label → dispatch plan-issue
    if: github.event_name == 'issues' && github.event.label.name == 'fix-me'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch plan-issue
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/dispatch_response -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ secrets.GHOST_SHIP_REPO }}/dispatches" \
            -d '{
              "event_type": "plan-issue",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "issue_number": ${{ github.event.issue.number }}
              }
            }')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch failed with HTTP ${HTTP_CODE}:"
            cat /tmp/dispatch_response
            exit 1
          fi
          echo "Dispatched plan-issue (HTTP ${HTTP_CODE})"

  approve:
    # approved label → dispatch fix-issue
    if: github.event_name == 'issues' && github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch fix-issue
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/dispatch_response -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+name" \
            "https://api.github.com/repos/${{ secrets.GHOST_SHIP_REPO }}/dispatches" \
            -d '{
              "event_type": "fix-issue",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "issue_number": ${{ github.event.issue.number }}
              }
            }')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch failed with HTTP ${HTTP_CODE}:"
            cat /tmp/dispatch_response
            exit 1
          fi
          echo "Dispatched fix-issue (HTTP ${HTTP_CODE})"

  revise:
    # @ghost-ship-ai comment on a planned issue → dispatch revise-plan
    if: >-
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '@ghost-ship-ai')
    runs-on: ubuntu-latest
    steps:
      - name: Check for planned label
        id: check
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels --jq '.[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "planned"; then
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch revise-plan
        if: steps.check.outputs.has_plan == 'true'
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/dispatch_response -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ secrets.GHOST_SHIP_REPO }}/dispatches" \
            -d '{
              "event_type": "revise-plan",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "issue_number": ${{ github.event.issue.number }}
              }
            }')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch failed with HTTP ${HTTP_CODE}:"
            cat /tmp/dispatch_response
            exit 1
          fi
          echo "Dispatched revise-plan (HTTP ${HTTP_CODE})"
